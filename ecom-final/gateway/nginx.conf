# ═══════════════════════════════════════════════════════════
# API Gateway — Nginx Configuration (Full Structure)
# Chức năng: Routing, Rate Limiting, Load Balancing
# ═══════════════════════════════════════════════════════════

# Cấu hình global
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

# events {} là bắt buộc trong nginx.conf đầy đủ
events {
    worker_connections 1024;
}

# Tất cả http config phải nằm trong http {}
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;

    # ─── Upstream services (Docker internal network) ──────────
    upstream user_service     { server user-service:8000; }
    upstream product_service  { server product-service:8000; }
    upstream cart_service     { server cart-service:8000; }
    upstream order_service    { server order-service:8000; }
    upstream payment_service  { server payment-service:8000; }
    upstream shipping_service { server shipping-service:8000; }
    upstream ai_service       { server ai-service:8006; }

    # ─── Rate limiting zones ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m     rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ai_zone:10m rate=20r/s;

    server {
        listen 80;
        server_name localhost;

        error_log  /var/log/nginx/error.log warn;
        client_max_body_size 10M;

        # Common proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ─── Auth (stricter rate limit) ───────────────────────
        location /api/users/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://user_service;
            proxy_connect_timeout 5s;
            proxy_read_timeout    10s;
        }

        # ─── User Service ─────────────────────────────────────
        location /api/users/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://user_service;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ─── Product Service ──────────────────────────────────
        location /api/products/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://product_service;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ─── Cart Service ─────────────────────────────────────
        location /api/carts/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://cart_service;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ─── Order Service ────────────────────────────────────
        location /api/orders/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://order_service;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ─── Payment Service ──────────────────────────────────
        location /api/payments/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://payment_service;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ─── Shipping Service ─────────────────────────────────
        location /api/shipping/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://shipping_service;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        # ─── AI Service (/api/ai/ → /api/ rewrite) ───────────
        location /api/ai/ {
            limit_req zone=ai_zone burst=10 nodelay;
            rewrite ^/api/ai/(.*)$ /api/$1 break;
            proxy_pass http://ai_service;
            proxy_connect_timeout 10s;
            proxy_read_timeout    120s;
            proxy_send_timeout    120s;
        }

        # ─── Health check ─────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ─── Default 404 ──────────────────────────────────────
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
