# docker-compose.yml — E-Commerce Microservices

# ═══════════════════════════════════════════════════════════
# E-Commerce Microservices — Docker Compose Orchestration
# ═══════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────
  # DATABASES (Polyglot Persistence)
  # ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: ecom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_MULTIPLE_DATABASES: productdb,cartdb,orderdb,shippingdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"  # 5433 để tránh conflict với PostgreSQL local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  neo4j:
    image: neo4j:5.20-community
    container_name: ecom-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password123 'RETURN 1' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ecom-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ecom-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    image: mysql:8.0
    container_name: ecom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql123}
      MYSQL_DATABASE: userdb
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts/mysql:/docker-entrypoint-initdb.d
    ports:
      - "3307:3306"  # 3307 để tránh conflict với MySQL local
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-mysql123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ecom-redis
    restart: unless-stopped
    ports:
      - "6380:6379"  # 6380 để tránh conflict với Redis local
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────
  # MICROSERVICES
  # ─────────────────────────────────────────────────────────

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: ecom-user-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-mysql123}@mysql/userdb
      REDIS_URL: ${REDIS_URL}
      CART_SERVICE_URL: ${CART_SERVICE_URL}
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-60}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
    env_file: .env
    volumes:
      - ./user-service:/app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: ecom-product-service
    restart: unless-stopped
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres/productdb
    env_file: .env
    volumes:
      - ./product-service:/app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: ecom-cart-service
    restart: unless-stopped
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres/cartdb
      REDIS_URL: ${REDIS_URL}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
    env_file: .env
    volumes:
      - ./cart-service:/app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: ecom-order-service
    restart: unless-stopped
    ports:
      - "8003:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres/orderdb
      REDIS_URL: ${REDIS_URL}
      CART_SERVICE_URL: ${CART_SERVICE_URL}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
      ORDER_EVENTS_CHANNEL: ${ORDER_EVENTS_CHANNEL:-order.events}
    env_file: .env
    volumes:
      - ./order-service:/app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: ecom-payment-service
    restart: unless-stopped
    ports:
      - "8004:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-mysql123}@mysql/paymentdb
      REDIS_URL: ${REDIS_URL}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL}
      ORDER_EVENTS_CHANNEL: ${ORDER_EVENTS_CHANNEL:-order.events}
    env_file: .env
    volumes:
      - ./payment-service:/app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  shipping-service:
    build:
      context: ./shipping-service
      dockerfile: Dockerfile
    container_name: ecom-shipping-service
    restart: unless-stopped
    ports:
      - "8005:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres/shippingdb
      REDIS_URL: ${REDIS_URL}
      ORDER_SERVICE_URL: ${ORDER_SERVICE_URL}
      ORDER_EVENTS_CHANNEL: ${ORDER_EVENTS_CHANNEL:-order.events}
    env_file: .env
    volumes:
      - ./shipping-service:/app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ecom-ai-service
    restart: unless-stopped
    ports:
      - "8006:8006"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      REDIS_URL: ${REDIS_URL}
      PRODUCT_SERVICE_URL: ${PRODUCT_SERVICE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      NUM_ITEMS: ${NUM_ITEMS:-11}
      EMBED_DIM: ${EMBED_DIM:-64}
      HIDDEN_DIM: ${HIDDEN_DIM:-128}
      TOP_K: ${TOP_K:-10}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-user_behavior_events}
    env_file: .env
    volumes:
      - ./ai-service:/app
      # Bỏ named volume này để container thấy được các file AI từ thư mục host
      # - ai_models:/app/model_weights
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────────────────

  gateway:
    image: nginx:1.25-alpine
    container_name: ecom-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
      - shipping-service
      - ai-service
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────────────────────
# NAMED VOLUMES
# ─────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: ecom_postgres_data
  mysql_data:
    name: ecom_mysql_data
  redis_data:
    name: ecom_redis_data
  ai_models:
    name: ecom_ai_models
  neo4j_data:
    name: ecom_neo4j_data
